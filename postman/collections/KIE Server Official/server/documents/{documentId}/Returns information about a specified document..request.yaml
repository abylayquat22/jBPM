$kind: http-request
url: "{{baseUrl}}/server/documents/:documentId"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: documentId
    value: xxx-yyy-zzz
    description: document id of a document that should be retruned
examples: ./.resources/Returns information about a specified document..resources/examples
order: 2000

$kind: http-request
url: "{{baseUrl}}/server/documents?page=0&pageSize=10"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "0"
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    description: optional pagination - size of the result, defaults to 10
examples: ./.resources/Returns all documents from KIE Server..resources/examples
order: 2000

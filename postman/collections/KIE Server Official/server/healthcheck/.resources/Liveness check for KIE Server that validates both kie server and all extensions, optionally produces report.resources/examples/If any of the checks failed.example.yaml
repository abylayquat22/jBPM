$kind: http-example
request:
  url: "{{baseUrl}}/server/healthcheck?report=false"
  method: GET
  queryParams:
    - key: report
      value: "false"
      description: optional report flag to return detailed report of the check,
        defaults to false
response:
  statusCode: 503
  statusText: Service Unavailable
  body:
    type: text
    content: ""
order: 2000

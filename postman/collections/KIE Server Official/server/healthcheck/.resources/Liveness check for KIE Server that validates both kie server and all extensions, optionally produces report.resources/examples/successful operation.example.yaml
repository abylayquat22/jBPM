$kind: http-example
request:
  url: "{{baseUrl}}/server/healthcheck?report=false"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: report
      value: "false"
      description: optional report flag to return detailed report of the check,
        defaults to false
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      [
        {
          "severity": "ERROR",
          "timestamp": "1969-05-29T11:06:26.410Z",
          "content": [
            "string",
            "string"
          ]
        },
        {
          "severity": "INFO",
          "timestamp": "1963-05-28T12:13:42.589Z",
          "content": [
            "string",
            "string"
          ]
        }
      ]
order: 1000

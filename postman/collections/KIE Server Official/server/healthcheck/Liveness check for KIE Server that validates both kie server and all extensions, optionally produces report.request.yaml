$kind: http-request
url: "{{baseUrl}}/server/healthcheck?report=false"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: report
    value: "false"
    description: optional report flag to return detailed report of the check,
      defaults to false
examples: ./.resources/Liveness check for KIE Server that validates both kie
  server and all extensions, optionally produces report.resources/examples
order: 1000

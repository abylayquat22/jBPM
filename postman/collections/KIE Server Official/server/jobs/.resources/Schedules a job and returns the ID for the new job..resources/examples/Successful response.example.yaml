$kind: http-example
request:
  url: "{{baseUrl}}/server/jobs?containerId=string"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  queryParams:
    - key: containerId
      value: string
      description: optional container id that the job should be associated with

$kind: http-example
request:
  url: "{{baseUrl}}/server/jobs?status=QUEUED&page=0&pageSize=10"
  method: GET
  queryParams:
    - key: status
      value: QUEUED
      description: optional job status (QUEUED, DONE, CANCELLED, ERROR, RETRYING, RUNNING)
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

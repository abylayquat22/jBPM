$kind: http-request
url: "{{baseUrl}}/server/jobs/commands/:cmd?status=RETRYING&status=QUEUED&page=\
  0&pageSize=10"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: status
    value: RETRYING
    description: optional job status (QUEUED, DONE, CANCELLED, ERROR, RETRYING, RUNNING)
  - key: status
    value: QUEUED
    description: optional job status (QUEUED, DONE, CANCELLED, ERROR, RETRYING, RUNNING)
  - key: page
    value: "0"
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    description: optional pagination - size of the result, defaults to 10
pathVariables:
  - key: cmd
    value: com.sample.CommandImpl
    description: name of the command that asynchornous jobs should be found for
examples: ./.resources/Returns jobs configured to run job commands, such as a
  job type org.jbpm.executor.commands.LogCleanupCommand..resources/examples
order: 1000

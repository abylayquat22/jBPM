$kind: http-example
request:
  url: "{{baseUrl}}/server/jobs/:jobId/data?containerId=string"
  method: POST
  headers:
    Content-Type: application/json
  queryParams:
    - key: containerId
      value: string
      description: optional container id that the job should be associated with
  pathVariables:
    - key: jobId
      value: "123"
      description: identifier of the asynchronous job to be updated
  body:
    type: json
    content: string
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 1000

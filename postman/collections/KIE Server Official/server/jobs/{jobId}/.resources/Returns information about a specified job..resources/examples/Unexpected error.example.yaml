$kind: http-example
request:
  url: "{{baseUrl}}/server/jobs/:jobId?withErrors=true&withData=true"
  method: GET
  queryParams:
    - key: withErrors
      value: "true"
      description: optional flag that indicats if errors should be loaded as well
    - key: withData
      value: "true"
      description: optional flag that indicats if input/output data should be loaded as well
  pathVariables:
    - key: jobId
      value: "123"
      description: identifier of the asynchronous job to be retrieved
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

$kind: http-example
request:
  url: "{{baseUrl}}/server/jobs/containers/:containerId?status=QUEUED&page=0&page\
    Size=10"
  method: GET
  queryParams:
    - key: status
      value: QUEUED
      description: optional job status (QUEUED, DONE, CANCELLED, ERROR, RETRYING, RUNNING)
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: identifier of the container that asynchornous jobs should be found for
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

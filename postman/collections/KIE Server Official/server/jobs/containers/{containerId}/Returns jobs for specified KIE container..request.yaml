$kind: http-request
url: "{{baseUrl}}/server/jobs/containers/:containerId?status=RETRYING&status=QU\
  EUED&page=0&pageSize=10"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: status
    value: RETRYING
    description: optional job status (QUEUED, DONE, CANCELLED, ERROR, RETRYING, RUNNING)
  - key: status
    value: QUEUED
    description: optional job status (QUEUED, DONE, CANCELLED, ERROR, RETRYING, RUNNING)
  - key: page
    value: "0"
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    description: optional pagination - size of the result, defaults to 10
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: identifier of the container that asynchornous jobs should be found for
examples: ./.resources/Returns jobs for specified KIE container..resources/examples
order: 1000

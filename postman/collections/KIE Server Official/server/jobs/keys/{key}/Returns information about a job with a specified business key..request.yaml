$kind: http-request
url: "{{baseUrl}}/server/jobs/keys/:key?status=RETRYING&status=QUEUED&page=0&pa\
  geSize=10"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: status
    value: RETRYING
    description: optional job status (QUEUED, DONE, CANCELLED, ERROR, RETRYING, RUNNING)
  - key: status
    value: QUEUED
    description: optional job status (QUEUED, DONE, CANCELLED, ERROR, RETRYING, RUNNING)
  - key: page
    value: "0"
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    description: optional pagination - size of the result, defaults to 10
pathVariables:
  - key: key
    value: custom-job
    description: identifier of the business key that asynchornous jobs should be found for
examples: ./.resources/Returns information about a job with a specified business
  key..resources/examples
order: 1000

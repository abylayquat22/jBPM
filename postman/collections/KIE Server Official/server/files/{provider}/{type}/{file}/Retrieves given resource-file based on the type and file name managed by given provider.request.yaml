$kind: http-request
name: Retrieves given resource/file based on the type and file name managed by
  given provider
url: "{{baseUrl}}/server/files/:provider/:type/:file"
method: GET
headers:
  Accept: "*/*"
pathVariables:
  - key: provider
    value: string
    description: Name of the provider that manages given resource
  - key: type
    value: string
    description: Type of the resource e.g. js, css, etc
  - key: file
    value: string
    description: Name of the resource to look up
examples: ./.resources/Retrieves given resource-file based on the type and file
  name managed by given provider.resources/examples
order: 1000

$kind: http-example
request:
  url: "{{baseUrl}}/server/files/:provider/:type/:file"
  method: GET
  headers:
    Accept: "*/*"
  pathVariables:
    - key: provider
      value: string
      description: Name of the provider that manages given resource
    - key: type
      value: string
      description: Type of the resource e.g. js, css, etc
    - key: file
      value: string
      description: Name of the resource to look up
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: string
order: 1000

$kind: http-example
name: resource/file not found
request:
  url: "{{baseUrl}}/server/files/:provider/:type/:file"
  method: GET
  pathVariables:
    - key: provider
      value: string
      description: Name of the provider that manages given resource
    - key: type
      value: string
      description: Type of the resource e.g. js, css, etc
    - key: file
      value: string
      description: Name of the resource to look up
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 2000

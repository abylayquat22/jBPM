$kind: http-example
request:
  url: "{{baseUrl}}/server/files/:type/:file"
  method: GET
  pathVariables:
    - key: type
      value: string
      description: Type of the resource e.g. js, css, etc
    - key: file
      value: string
      description: Name of the resource to look up
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 3000

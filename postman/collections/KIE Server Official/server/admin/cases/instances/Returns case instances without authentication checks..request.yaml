$kind: http-request
url: "{{baseUrl}}/server/admin/cases/instances?status=open&status=closed&page=0\
  &pageSize=10&sort=string&sortOrder=true&withData=false"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: status
    value: open
    description: optional case instance status (open, closed, canceled) - defaults
      ot open (1) only
  - key: status
    value: closed
    description: optional case instance status (open, closed, canceled) - defaults
      ot open (1) only
  - key: page
    value: "0"
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    description: optional pagination - size of the result, defaults to 10
  - key: sort
    value: string
    description: optional sort column, no default
  - key: sortOrder
    value: "true"
    description: optional sort direction (asc, desc) - defaults to asc
  - key: withData
    value: "false"
    description: optional flag to load data when loading case instance
examples: ./.resources/Returns case instances without authentication
  checks..resources/examples
order: 1000

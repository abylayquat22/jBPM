$kind: http-example
request:
  url: "{{baseUrl}}/server/admin/containers/:containerId/tasks/:taskInstanceId/ex\
    l-owners/groups/:entityId?user=string"
  method: DELETE
  queryParams:
    - key: user
      value: string
      description: optional user id to be used instead of authenticated user - only
        when bypass authenticated user is enabled
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that task instance belongs to
    - key: taskInstanceId
      value: "123"
      description: identifier of task instance to be updated
    - key: entityId
      value: HR
      description: list of groups to be removed from excluded owners list
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 1000

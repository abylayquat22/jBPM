$kind: http-example
request:
  url: "{{baseUrl}}/server/admin/containers/:containerId/tasks/:taskInstanceId/no\
    tifications?expiresAt=string&whenNotStarted=false&whenNotCompleted=false"
  method: POST
  headers:
    Content-Type: application/json
  queryParams:
    - key: expiresAt
      value: string
      description: time expression for notification
    - key: whenNotStarted
      value: "false"
      description: optional flag that indicates the type of notification, either
        whenNotStarted or whenNotCompleted must be set
    - key: whenNotCompleted
      value: "false"
      description: optional flag that indicates the type of notification, either
        whenNotStarted or whenNotCompleted must be set
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that task instance belongs to
    - key: taskInstanceId
      value: "123"
      description: identifier of task instance to be updated
  body:
    type: json
    content: string
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 3000

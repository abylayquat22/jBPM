$kind: http-request
url: "{{baseUrl}}/server/admin/containers/:containerId/processes/instances/:pro\
  cessInstanceId/nodeinstances/:nodeInstanceId"
method: PUT
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that process instance belongs to
  - key: processInstanceId
    value: "123"
    description: identifier of process instance that node instance belongs to
  - key: nodeInstanceId
    value: "567"
    description: identifier of node instance that should be retriggered
examples: ./.resources/Re-triggers a specified node instance for a specified
  process instance. If the node is not active in the process instance, it
  becomes active upon re-triggering..resources/examples
order: 1000

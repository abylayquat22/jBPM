$kind: http-example
request:
  url: "{{baseUrl}}/server/admin/containers/:containerId/processes/instances/:pro\
    cessInstanceId/nodes/:nodeId"
  method: POST
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instance belongs to
    - key: processInstanceId
      value: "123"
      description: identifier of process instance where node should be triggered
    - key: nodeId
      value: "567"
      description: identifier of the node to be triggered
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

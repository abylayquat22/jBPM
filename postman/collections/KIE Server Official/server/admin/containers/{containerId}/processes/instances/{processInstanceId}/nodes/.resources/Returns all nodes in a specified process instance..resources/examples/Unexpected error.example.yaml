$kind: http-example
request:
  url: "{{baseUrl}}/server/admin/containers/:containerId/processes/instances/:pro\
    cessInstanceId/nodes"
  method: GET
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instance belongs to
    - key: processInstanceId
      value: "123"
      description: identifier of process instance that process nodes should be
        collected from
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 3000

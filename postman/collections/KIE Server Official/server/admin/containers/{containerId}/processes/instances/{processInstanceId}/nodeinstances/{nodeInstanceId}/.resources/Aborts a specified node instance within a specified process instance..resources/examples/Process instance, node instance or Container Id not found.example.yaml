$kind: http-example
request:
  url: "{{baseUrl}}/server/admin/containers/:containerId/processes/instances/:pro\
    cessInstanceId/nodeinstances/:nodeInstanceId"
  method: DELETE
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instance belongs to
    - key: processInstanceId
      value: "123"
      description: identifier of process instance that node instance belongs to

$kind: http-example
request:
  url: "{{baseUrl}}/server/admin/containers/:containerId/processes/instances?proc\
    essInstanceId=5240&targetContainerId=string&targetProcessId=string"
  method: PUT
  headers:
    Content-Type: application/json
  queryParams:
    - key: processInstanceId
      value: "5240"
      description: list of identifiers of process instance to be migrated
    - key: targetContainerId
      value: string
      description: container id that new process definition belongs to
    - key: targetProcessId
      value: string
      description: process definition that process instances should be migrated to
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instances belongs to
  body:
    type: json
    content: string
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 3000

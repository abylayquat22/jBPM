$kind: http-example
request:
  url: "{{baseUrl}}/server/queries/processes/definitions?filter=string&page=0&pag\
    eSize=10&sort=string&sortOrder=true"
  method: GET
  queryParams:
    - key: filter
      value: string
      description: process id or name to filter process definitions
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
    - key: sort
      value: string
      description: optional sort column, no default
    - key: sortOrder
      value: "true"
      description: optional sort direction (asc, desc) - defaults to asc
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

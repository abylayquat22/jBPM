$kind: http-example
request:
  url: "{{baseUrl}}/server/queries/processes/instances/:processInstanceId/nodes/i\
    nstances?activeOnly=true&completedOnly=true&page=0&pageSize=10"
  method: GET
  queryParams:
    - key: activeOnly
      value: "true"
      description: include active nodes only
    - key: completedOnly
      value: "true"
      description: include completed nodes only
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
  pathVariables:
    - key: processInstanceId
      value: "3284"
      description: process instance id to to retrive history for
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

$kind: http-request
url: "{{baseUrl}}/server/queries/processes/instances/:processInstanceId/wi-node\
  s/instances/:workItemId"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: processInstanceId
    value: "{{processInstanceId}}"
    description: process instance id that work item belongs to
  - key: workItemId
    value: "3284"
    description: work item id to retrieve node instance for
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
examples: ./.resources/Returns node instances for a specified work item in a
  specified process instance..resources/examples
order: 1000

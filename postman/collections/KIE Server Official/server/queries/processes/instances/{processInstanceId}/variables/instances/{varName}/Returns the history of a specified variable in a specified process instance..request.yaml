$kind: http-request
url: "{{baseUrl}}/server/queries/processes/instances/:processInstanceId/variabl\
  es/instances/:varName?page=0&pageSize=10"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "0"
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    description: optional pagination - size of the result, defaults to 10
pathVariables:
  - key: processInstanceId
    value: "22376"
    description: process instance id to load variable history for
  - key: varName
    value: inp_body
    description: variable name that history should be loaded for
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
examples: ./.resources/Returns the history of a specified variable in a
  specified process instance..resources/examples
order: 1000

$kind: http-request
url: "{{baseUrl}}/server/queries/processes/instances/:processInstanceId/nodes/i\
  nstances"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: activeOnly
    value: "true"
    disabled: true
    description: include active nodes only
  - key: completedOnly
    value: "true"
    disabled: true
    description: include completed nodes only
  - key: page
    value: "0"
    disabled: true
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    disabled: true
    description: optional pagination - size of the result, defaults to 10
pathVariables:
  - key: processInstanceId
    value: "{{processInstanceId}}"
    description: process instance id to to retrive history for
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
examples: ./.resources/Returns node instances for a specified process
  instance..resources/examples
order: 1000

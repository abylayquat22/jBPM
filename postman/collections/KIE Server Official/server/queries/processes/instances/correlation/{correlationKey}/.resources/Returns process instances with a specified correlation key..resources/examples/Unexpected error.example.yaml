$kind: http-example
request:
  url: "{{baseUrl}}/server/queries/processes/instances/correlation/:correlationKe\
    y?page=0&pageSize=10&sort=string&sortOrder=true"
  method: GET
  queryParams:
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
    - key: sort
      value: string
      description: optional sort column, no default
    - key: sortOrder
      value: "true"
      description: optional sort direction (asc, desc) - defaults to asc
  pathVariables:
    - key: correlationKey
      value: string
      description: correlation key to filter process instance, can be given as partial
        correlation key like in starts with approach
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

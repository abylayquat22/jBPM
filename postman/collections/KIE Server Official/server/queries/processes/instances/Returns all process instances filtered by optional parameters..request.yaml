$kind: http-request
url: "{{baseUrl}}/server/queries/processes/instances?status=3&processName={{pro\
  cessId}}&sort=&sortOrder=false"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: status
    value: "3"
    description: optional process instance status (active, completed, aborted) -
      defaults ot active (1) only
  - key: initiator
    value: string
    disabled: true
    description: optional process instance initiator - user who started process
      instance to filter process instances
  - key: processName
    value: "{{processId}}"
    description: optional process name to filter process instances
  - key: page
    value: "0"
    disabled: true
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    disabled: true
    description: optional pagination - size of the result, defaults to 10
  - key: sort
    value: ""
    description: optional sort column, no default
  - key: sortOrder
    value: "false"
    description: optional sort direction (asc, desc) - defaults to asc
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
examples: ./.resources/Returns all process instances filtered by optional
  parameters..resources/examples
order: 4000

$kind: http-request
url: "{{baseUrl}}/server/queries/processes/instances/variables/:varName"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: varValue
    value: string
    disabled: true
    description: variable value to filter process instance, optional when filtering
      by name only required when filtering by name and value
  - key: status
    value: "3"
    disabled: true
    description: optional process instance status (active, completed, aborted) -
      defaults ot active (1) only
  - key: status
    value: "3"
    disabled: true
    description: optional process instance status (active, completed, aborted) -
      defaults ot active (1) only
  - key: page
    value: "0"
    disabled: true
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    disabled: true
    description: optional pagination - size of the result, defaults to 10
  - key: sort
    value: string
    disabled: true
    description: optional sort column, no default
  - key: sortOrder
    value: "true"
    disabled: true
    description: optional sort direction (asc, desc) - defaults to asc
pathVariables:
  - key: varName
    value: string
    description: variable name to filter process instance
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
examples: ./.resources/Returns process instances with a specified
  variable..resources/examples
order: 1000

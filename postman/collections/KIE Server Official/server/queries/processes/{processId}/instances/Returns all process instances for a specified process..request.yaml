$kind: http-request
url: "{{baseUrl}}/server/queries/processes/:processId/instances?status=3&status\
  =3&initiator=string&page=0&pageSize=10&sort=string&sortOrder=true"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: status
    value: "3"
    description: optional process instance status (active, completed, aborted) -
      defaults ot active (1) only
  - key: status
    value: "3"
    description: optional process instance status (active, completed, aborted) -
      defaults ot active (1) only
  - key: initiator
    value: string
    description: optinal process instance initiator - user who started process

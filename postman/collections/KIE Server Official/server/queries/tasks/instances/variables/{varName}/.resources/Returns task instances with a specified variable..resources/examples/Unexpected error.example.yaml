$kind: http-example
request:
  url: "{{baseUrl}}/server/queries/tasks/instances/variables/:varName?varValue=st\
    ring&status=Exited&user=string&page=0&pageSize=10&sort=string&sortOrder=tru\
    e"
  method: GET
  queryParams:
    - key: varValue
      value: string
      description: value of the variable used to fiter tasks, optional when filtering
        only by name, required when filtering by both name and value
    - key: status
      value: Exited
      description: optional task status (Created, Ready, Reserved, InProgress,
        Suspended, Completed, Failed, Error, Exited, Obsolete)
    - key: user
      value: string
      description: optional user id to be used instead of authenticated user - only
        when bypass authenticated user is enabled
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
    - key: sort
      value: string
      description: optional sort column, no default
    - key: sortOrder
      value: "true"
      description: optional sort direction (asc, desc) - defaults to asc
  pathVariables:
    - key: varName
      value: string
      description: name of the variable used to fiter tasks
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

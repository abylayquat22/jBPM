$kind: http-example
request:
  url: "{{baseUrl}}/server/queries/containers/:containerId/processes/definitions/\
    :processId"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: containerId
      value: string
      description: container id that process definition belongs to
    - key: processId
      value: string
      description: process id to load process definition
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "associatedEntities": {
          "Qualify": [
            "approver"
          ],
          "Final Approval": [
            "manager"
          ],
          "Correct Data": [
            "broker"
          ],
          "Increase Down Payment": [
            "broker"
          ]
        },
        "serviceTasks": {},
        "processVariables": {
          "inlimit": "Boolean",
          "application": "com.myspace.mortgage_app.Application",
          "incdownpayment": "Boolean"
        },
        "reusableSubProcesses": [],
        "process-id": "Mortgage_Process.MortgageApprovalProcess",
        "process-name": "MortgageApprovalProcess",
        "process-version": "1.0",
        "package": "com.myspace.mortgage_app",
        "container-id": "mortgage-process_1.0.0-SNAPSHOT",
        "dynamic": false
      }
order: 1000

$kind: http-example
request:
  url: "{{baseUrl}}/server/queries/containers/:containerId/process/instances/coun\
    t?status=3"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: status
      value: "3"
      description: optional process instance status (active, completed, aborted) -
        defaults ot active (1) only
  pathVariables:
    - key: containerId
      value: string
      description: container id to filter process instance
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "count": 150
      }
order: 1000

$kind: http-request
url: "{{baseUrl}}/server/queries/definitions/:queryName/data?mapper=string&orde\
  rBy=string&page=0&pageSize=10"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: mapper
    value: string
    description: identifier of the query mapper to be used when transforming results
  - key: orderBy
    value: string
    description: optional sort order
  - key: page
    value: "0"
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    description: optional pagination - size of the result, defaults to 10
pathVariables:
  - key: queryName
    value: customQuery
    description: identifier of the query definition to be used for query
examples: ./.resources/Returns the results of a specified custom
  query..resources/examples
order: 1000

$kind: http-example
request:
  url: "{{baseUrl}}/server/queries/definitions/:queryName"
  method: PUT
  headers:
    Content-Type: application/json
  pathVariables:
    - key: queryName
      value: customQuery
      description: identifier of the query definition to be replaced
  body:
    type: json
    content: string
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

$kind: http-example
request:
  url: "{{baseUrl}}/server/queries/definitions/:queryName/filtered-data?mapper=st\
    ring&builder=string&page=0&pageSize=10"
  method: POST
  headers:
    Content-Type: application/json
  queryParams:
    - key: mapper
      value: string
      description: identifier of the query mapper to be used when transforming results
    - key: builder
      value: string
      description: optional identifier of the query builder to be used for query conditions
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
  pathVariables:
    - key: queryName
      value: customQuery
      description: identifier of the query definition to be used for query
  body:
    type: json
    content: string
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 3000

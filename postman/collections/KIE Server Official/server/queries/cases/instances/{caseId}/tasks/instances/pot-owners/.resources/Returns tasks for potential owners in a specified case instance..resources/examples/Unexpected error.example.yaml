$kind: http-example
request:
  url: "{{baseUrl}}/server/queries/cases/instances/:caseId/tasks/instances/pot-ow\
    ners?user=string&status=Exited&page=0&pageSize=10&sort=string&sortOrder=tru\
    e"
  method: GET
  queryParams:
    - key: user
      value: string
      description: optional user id to be used instead of authenticated user - only
        when bypass authenticated user is enabled
    - key: status
      value: Exited
      description: optional task status (Created, Ready, Reserved, InProgress,
        Suspended, Completed, Failed, Error, Exited, Obsolete)
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
    - key: sort
      value: string
      description: optional sort column, no default
    - key: sortOrder
      value: "true"
      description: optional sort direction (asc, desc) - defaults to asc
  pathVariables:
    - key: caseId
      value: CASE-00000000011
      description: case instance identifier that tasks should belong to
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

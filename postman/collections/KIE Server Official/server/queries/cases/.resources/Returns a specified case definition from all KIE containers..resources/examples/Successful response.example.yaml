request:
  url: "{{baseUrl}}/server/queries/cases?filter=string&page=0&pageSize=10&sort=st\
    ring&sortOrder=true"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: filter
      value: string
      description: case definition id or name that case definitions will be filtered by
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
    - key: sort
      value: string
      description: optional sort column, no default
    - key: sortOrder
      value: "true"
      description: optional sort direction (asc, desc) - defaults to asc

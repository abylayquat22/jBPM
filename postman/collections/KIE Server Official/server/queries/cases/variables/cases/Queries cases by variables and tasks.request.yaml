$kind: http-request
url: "{{baseUrl}}/server/queries/cases/variables/cases?page=0&pageSize=10"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: page
    value: "0"
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    description: optional pagination - size of the result, defaults to 10
body:
  type: json
  content: string
examples: ./.resources/Queries cases by variables and tasks.resources/examples
order: 2000

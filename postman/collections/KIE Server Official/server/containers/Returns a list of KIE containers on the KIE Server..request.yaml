$kind: http-request
url: "{{baseUrl}}/server/containers?groupId=string&artifactId=string&version=st\
  ring&status=string"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: groupId
    value: string
    description: optional groupId to filter containers by
  - key: artifactId
    value: string
    description: optional artifactId to filter containers by
  - key: version
    value: string
    description: optional version to filter containers by
  - key: status
    value: string
    description: optional status to filter containers by
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
examples: ./.resources/Returns a list of KIE containers on the KIE
  Server..resources/examples
order: 3000

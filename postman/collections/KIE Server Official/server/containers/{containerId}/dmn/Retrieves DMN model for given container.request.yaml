$kind: http-request
description: 'Please reference the documentation for usage of the KIE Server
  REST API for DMN (doc ref: "Executing a DMN service using the KIE Server REST
  API" section in the Getting started with decision services).'
url: "{{baseUrl}}/server/containers/:containerId/dmn"
method: GET
headers:
  Accept: application/xml
pathVariables:
  - key: containerId
    value: traffic-violation_1.0.0-SNAPSHOT
    description: Container id that models should be loaded from
examples: ./.resources/Retrieves DMN model for given container.resources/examples
order: 4000

$kind: http-request
description: 'Retrieves the Model-specific Swagger/OAS definitions, for the
  given Container id. Please reference container-specific generated Swagger/OAS
  definitions, as described in the documentation (doc ref: "REST endpoints for
  specific DMN models", req refs: BAPL-1787, DROOLS-6047).'
url: "{{baseUrl}}/server/containers/:containerId/dmn/openapi"
method: GET
pathVariables:
  - key: containerId
    value: string
    description: Container id to retrieve the Model-specific definitions
examples: ./.resources/Model-specific definitions.resources/examples
order: 1000

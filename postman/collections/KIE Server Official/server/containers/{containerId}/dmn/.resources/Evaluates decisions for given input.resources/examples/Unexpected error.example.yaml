$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/dmn"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    - key: containerId
      value: traffic-violation_1.0.0-SNAPSHOT
      description: Container id to be used to evaluate decisions on
  body:
    type: json
    content: string
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 3000

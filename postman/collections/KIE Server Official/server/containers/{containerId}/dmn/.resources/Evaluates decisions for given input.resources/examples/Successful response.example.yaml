$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/dmn"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/xml
  pathVariables:
    - key: containerId
      value: traffic-violation_1.0.0-SNAPSHOT
      description: Container id to be used to evaluate decisions on
  body:
    type: json
    content: string
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "type": "SUCCESS",
        "msg": "OK from container 'Traffic-Violation_1.0.0-SNAPSHOT'",
        "result": {
          "dmn-evaluation-result": {
            "messages": [],
            "model-namespace": "https://github.com/kiegroup/drools/kie-dmn/_7D8116DE-ADF5-4560-A116-FE1A2EAFFF48",
            "model-name": "Traffic Violation",
            "decision-name": [],
            "dmn-context": {
              "Violation": {
                "Type": "speed",
                "Speed Limit": 100,
                "Actual Speed": 135
              },
              "Should Driver be Suspended?": "Yes",
              "Driver": {
                "Points": 15
              },
              "Fine": {
                "Points": 7,
                "Amount": 1000
              }
            },
            "decision-results": {

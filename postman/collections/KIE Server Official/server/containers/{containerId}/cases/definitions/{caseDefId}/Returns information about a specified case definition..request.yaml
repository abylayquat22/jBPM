$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/cases/definitions/:caseDefId"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that should be used to filter case definitions
  - key: caseDefId
    value: CASE-00000000001
    description: case definition id that should be loaded
examples: ./.resources/Returns information about a specified case
  definition..resources/examples
order: 1000

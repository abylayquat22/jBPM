$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/cases/definitions?page=0&pageS\
  ize=10&sort=string&sortOrder=true"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "0"
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    description: optional pagination - size of the result, defaults to 10
  - key: sort
    value: string
    description: optional sort column, no default
  - key: sortOrder
    value: "true"
    description: optional sort direction (asc, desc) - defaults to asc
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that should be used to filter case definitions
examples: ./.resources/Returns case definitions in a specified KIE
  container..resources/examples
order: 2000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/cases/:caseDefId/instances/:ca\
    seId"
  method: PUT
  headers:
    Content-Type: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id where the case definition resides
    - key: caseDefId
      value: evaluation
      description: case definition id that new instance should be created from
    - key: caseId
      value: string
      description: identifier of the case instance
  body:
    type: json
    content: string
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 1000

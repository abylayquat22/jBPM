$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/cases/:caseDefId/instances"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id where the case definition resides
    - key: caseDefId
      value: CASE-0000000001
      description: case definition id that new instance should be created from
  body:
    type: json
    content: string
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: CASE-0000000012
order: 1000

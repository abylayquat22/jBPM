$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/cases/instances/:caseId/nodes/\
  instances?completed=false&page=0&pageSize=10"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: completed
    value: "false"
    description: optional flag that allows to control which node instances to load -
      active or completed, defaults to false loading only active ones
  - key: page
    value: "0"
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    description: optional pagination - size of the result, defaults to 10
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that case instance belongs to
  - key: caseId
    value: CASE-00000000001
    description: identifier of the case instance
examples: ./.resources/Returns node instances for a specified case
  instance..resources/examples
order: 1000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/cases/instances/:caseId/stages\
    ?activeOnly=true&page=0&pageSize=10"
  method: GET
  queryParams:
    - key: activeOnly
      value: "true"
      description: optional flag that allows to control which stages to load - active
        only or completed ones too, defaults to true
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that case instance belongs to
    - key: caseId
      value: CASE-00000000001
      description: identifier of the case instance
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 2000

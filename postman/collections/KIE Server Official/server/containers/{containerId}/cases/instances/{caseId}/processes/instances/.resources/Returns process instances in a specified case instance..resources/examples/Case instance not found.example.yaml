$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/cases/instances/:caseId/proces\
    ses/instances?status=3&page=0&pageSize=10&sort=string&sortOrder=true"
  method: GET
  queryParams:
    - key: status
      value: "3"
      description: optional process instance status (active, completed, aborted) -
        defaults ot active (1) only
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
    - key: sort
      value: string
      description: optional sort column, no default
    - key: sortOrder
      value: "true"
      description: optional sort direction (asc, desc) - defaults to asc
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that case instance belongs to
    - key: caseId
      value: CASE-00000000001
      description: identifier of the case instance
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 2000

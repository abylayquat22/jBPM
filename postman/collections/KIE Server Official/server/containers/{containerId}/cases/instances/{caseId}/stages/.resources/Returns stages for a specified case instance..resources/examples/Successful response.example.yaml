$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/cases/instances/:caseId/stages\
    ?activeOnly=true&page=0&pageSize=10"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: activeOnly
      value: "true"
      description: optional flag that allows to control which stages to load - active
        only or completed ones too, defaults to true
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that case instance belongs to
    - key: caseId
      value: CASE-00000000001
      description: identifier of the case instance
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "stages": [
          {
            "stage-name": "string",
            "stage-id": "string",
            "stage-status": "string",
            "adhoc-fragments": [
              {
                "name": "string",
                "type": "string"
              }
            ],
            "active-nodes": [
              {
                "node-instance-id": 0,
                "node-name": "string",
                "process-instance-id": 0,
                "work-item-id": 0,
                "container-id": "string",
                "start-date": "2018-10-25T18:34:44.456Z",
                "node-id": "string",
                "node-type": "string",
                "node-connection": "string",
                "node-completed": true,
                "reference-id": 0,
                "sla-compliance": 0,
                "sla-due-date": "2018-10-25T18:34:44.456Z"
              }
            ]
          }
        ]
      }
order: 1000

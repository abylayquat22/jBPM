$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/cases/instances/:caseId/proces\
  ses/:processId"
method: POST
headers:
  Content-Type: application/json
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that case instance belongs to
  - key: caseId
    value: CASE-00000000001
    description: identifier of the case instance
  - key: processId
    value: placeOrder
    description: process id of the subprocess to be added
body:
  type: json
  content: string
examples: ./.resources/Adds a dynamic subprocess to a specified case
  instance..resources/examples
order: 1000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/cases/instances/:caseId/commen\
    ts?sort=string&page=0&pageSize=10"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: sort
      value: string
      description: optional sort column, no default
    - key: page
      value: "0"
      description: optional pagination - at which page to start, defaults to 0
        (meaning first)
    - key: pageSize
      value: "10"
      description: optional pagination - size of the result, defaults to 10
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that case instance belongs to
    - key: caseId
      value: CASE-00000000001
      description: identifier of the case instance
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "comments": [
          {
            "id": "f15419b6-1967-479b-8509-066f579c59e1",
            "author": "baAdmin",
            "text": "Updated case with new ad hoc fragment.",
            "added-at": {
              "java.util.Date": 1540494739762
            },
            "restricted-to": [
              "owner"
            ]
          }
            {
              "id": "2b072823-7448-4819-9560-01165bc7e805",
              "author": "baAdmin",
              "text": "Removed hardware preparation requirement.",
              "added-at": {
                "java.util.Date": 1540494802456
              },
              "restricted-to": [
                "supplier"
              ]
          }
        ]
      }
order: 1000

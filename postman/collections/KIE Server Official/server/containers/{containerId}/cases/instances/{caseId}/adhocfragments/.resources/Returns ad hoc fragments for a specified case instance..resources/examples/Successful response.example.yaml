$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/cases/instances/:caseId/adhocf\
    ragments"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that case instance belongs to
    - key: caseId
      value: CASE-00000000001
      description: identifier of the case instance
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "fragments": [
          {
            "name": "Prepare hardware spec",
            "type": "HumanTaskNode"
          },
          {
            "name": "Milestone 1: Order placed",
            "type": "MilestoneNode"
          },
          {
            "name": "Milestone 2: Order shipped",
            "type": "MilestoneNode"
          },
          {
            "name": "Milestone 3: Delivered to customer",
            "type": "MilestoneNode"
          },
          {
            "name": "Hardware spec ready",
            "type": "MilestoneNode"
          },
          {
            "name": "Manager decision",
            "type": "MilestoneNode"
          }
        ]
      }
order: 1000

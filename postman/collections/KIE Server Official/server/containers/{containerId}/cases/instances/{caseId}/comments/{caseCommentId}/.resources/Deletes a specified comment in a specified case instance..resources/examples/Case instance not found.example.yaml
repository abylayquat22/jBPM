$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/cases/instances/:caseId/commen\
    ts/:caseCommentId"
  method: DELETE
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that case instance belongs to
    - key: caseId
      value: CASE-00000000001
      description: identifier of the case instance
    - key: caseCommentId
      value: xxx-yyy-zzz
      description: identifier of the comment to be removed
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 1000

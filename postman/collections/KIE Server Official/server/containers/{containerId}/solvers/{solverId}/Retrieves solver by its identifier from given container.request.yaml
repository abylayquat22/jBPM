$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/solvers/:solverId"
method: GET
headers:
  Accept: application/xml
pathVariables:
  - key: containerId
    value: string
    description: container id where the solver resides
  - key: solverId
    value: string
    description: identifier of the solver
examples: ./.resources/Retrieves solver by its identifier from given
  container.resources/examples
order: 4000

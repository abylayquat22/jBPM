$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/solvers/:solverId/state/termin\
  ating-early"
method: POST
pathVariables:
  - key: containerId
    value: string
    description: container id where the solver resides
  - key: solverId
    value: string
    description: identifier of the solver
examples: ./.resources/Terminates early running solver with given id within
  container.resources/examples
order: 1000

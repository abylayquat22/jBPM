$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/solvers/:solverId/problemfactc\
    hanges/processed"
  method: GET
  headers:
    Accept: application/xml
  pathVariables:
    - key: containerId
      value: string
      description: container id where the solver resides
    - key: solverId
      value: string
      description: identifier of the solver
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: "true"
order: 1000

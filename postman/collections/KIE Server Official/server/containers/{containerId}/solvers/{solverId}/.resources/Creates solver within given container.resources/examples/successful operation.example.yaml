$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/solvers/:solverId"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/xml
  pathVariables:
    - key: containerId
      value: string
      description: container id where the solver config resides
    - key: solverId
      value: string
      description: identifier of the solver to create
  body:
    type: json
    content: string
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "container-id": "string",
        "solver-id": "string",
        "solver-config-file": "string",
        "status": "TERMINATING_EARLY",
        "score": {
          "value": "string"
        },
        "best-solution": {}
      }
order: 1000

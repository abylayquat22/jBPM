$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/solvers/:solverId/state/solving"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    - key: containerId
      value: string
      description: container id where the solver resides
    - key: solverId
      value: string
      description: identifier of the solver
  body:
    type: json
    content: string
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

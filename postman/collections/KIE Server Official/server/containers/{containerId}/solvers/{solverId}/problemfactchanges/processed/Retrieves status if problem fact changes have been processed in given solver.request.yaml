$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/solvers/:solverId/problemfactc\
  hanges/processed"
method: GET
headers:
  Accept: application/xml
pathVariables:
  - key: containerId
    value: string
    description: container id where the solver resides
  - key: solverId
    value: string
    description: identifier of the solver
examples: ./.resources/Retrieves status if problem fact changes have been
  processed in given solver.resources/examples
order: 1000

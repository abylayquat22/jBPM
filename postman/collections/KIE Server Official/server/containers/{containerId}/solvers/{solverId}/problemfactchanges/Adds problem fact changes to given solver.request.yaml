$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/solvers/:solverId/problemfactc\
  hanges"
method: POST
headers:
  Content-Type: application/json
pathVariables:
  - key: containerId
    value: string
    description: container id where the solver resides
  - key: solverId
    value: string
    description: identifier of the solver
body:
  type: json
  content: string
examples: ./.resources/Adds problem fact changes to given solver.resources/examples
order: 2000

$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/solvers/:solverId"
method: DELETE
pathVariables:
  - key: containerId
    value: string
    description: container id where the solver resides
  - key: solverId
    value: string
    description: identifier of the solver
examples: ./.resources/Disposes given solver.resources/examples
order: 6000

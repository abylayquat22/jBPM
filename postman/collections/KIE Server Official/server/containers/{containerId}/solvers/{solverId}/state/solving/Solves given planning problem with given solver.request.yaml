$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/solvers/:solverId/state/solving"
method: POST
headers:
  Content-Type: application/json
pathVariables:
  - key: containerId
    value: string
    description: container id where the solver resides
  - key: solverId
    value: string
    description: identifier of the solver
body:
  type: json
  content: string
examples: ./.resources/Solves given planning problem with given solver.resources/examples
order: 1000

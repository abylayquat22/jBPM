$kind: http-example
request:
  url: "{{baseUrl}}:/server/containers/:containerId/processes/:processId/computed\
    Instances"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id where the process definition resides
    - key: processId
      value: evaluation
      description: process id that new instance should be created from
  body:
    type: json
    content: string
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "age": 25,
        "person": {
          "Person": {
            "name": "john"
          }
        }
      }
order: 1000

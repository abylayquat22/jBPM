$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/:processId/instances\
    /fromNodes"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id where the process definition resides
    - key: processId
      value: evaluation
      description: process instance id that new instance should be created from
  body:
    type: json
    content: string
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: text
    content: ""
order: 2000

$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/processes/definitions/:processId"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id where the process definition resides
  - key: processId
    value: evaluation
    description: process id that the definition should be retrieved for
examples: ./.resources/Returns entity and task information for a specified
  process..resources/examples
order: 5000

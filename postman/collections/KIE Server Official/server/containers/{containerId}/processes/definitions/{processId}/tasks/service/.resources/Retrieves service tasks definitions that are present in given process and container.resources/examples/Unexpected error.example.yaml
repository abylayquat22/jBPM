$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/definitions/:process\
    Id/tasks/service"
  method: GET
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id where the process definition resides
    - key: processId
      value: evaluation
      description: process id that the service task definitions should be retrieved from
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 3000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/definitions/:process\
    Id/tasks/users/:taskName/outputs"
  method: GET
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id where the process definition resides
    - key: processId
      value: evaluation
      description: process id that given task belongs to
    - key: taskName
      value: Review
      description: task name that output variable definitions should be retrieved for
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 2000

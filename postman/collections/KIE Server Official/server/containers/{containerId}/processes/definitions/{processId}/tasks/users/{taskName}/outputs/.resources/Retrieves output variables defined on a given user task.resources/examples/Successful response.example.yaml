$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/definitions/:process\
    Id/tasks/users/:taskName/outputs"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id where the process definition resides
    - key: processId
      value: evaluation
      description: process id that given task belongs to
    - key: taskName
      value: Review
      description: task name that output variable definitions should be retrieved for
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "taskOutputs": {
          "application": "com.myspace.mortgage_app.Application"
        }
      }
order: 1000

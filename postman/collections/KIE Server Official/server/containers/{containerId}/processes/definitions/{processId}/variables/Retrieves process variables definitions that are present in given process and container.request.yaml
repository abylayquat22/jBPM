$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/processes/definitions/:process\
  Id/variables"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id where the process definition resides
  - key: processId
    value: evaluation
    description: process id that the variable definitions should be retrieved from
examples: ./.resources/Retrieves process variables definitions that are present
  in given process and container.resources/examples
order: 1000

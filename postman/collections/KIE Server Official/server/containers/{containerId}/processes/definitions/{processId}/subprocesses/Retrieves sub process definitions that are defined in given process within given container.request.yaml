$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/processes/definitions/:process\
  Id/subprocesses"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id where the process definition resides
  - key: processId
    value: evaluation
    description: process id that subprocesses should be retrieved from
examples: ./.resources/Retrieves sub process definitions that are defined in
  given process within given container.resources/examples
order: 1000

$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/processes/definitions/:process\
  Id/tasks/users"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id where the process definition resides
  - key: processId
    value: evaluation
    description: process id that the user task definitions should be retrieved from
examples: ./.resources/Retrieves user tasks definitions that are present in
  given process and container.resources/examples
order: 2000

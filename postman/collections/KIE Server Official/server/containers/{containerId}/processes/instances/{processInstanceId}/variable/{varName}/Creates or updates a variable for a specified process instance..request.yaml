$kind: http-request
url: "{{baseUrl}}:/server/containers/:containerId/processes/instances/:processI\
  nstanceId/variable/:varName"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that process instance belongs to
  - key: processInstanceId
    value: "123"
    description: identifier of the process instance to be updated
  - key: varName
    value: name
    description: name of the variable to be set/updated
body:
  type: json
  content: ""
examples: ./.resources/Creates or updates a variable for a specified process
  instance..resources/examples
order: 2000

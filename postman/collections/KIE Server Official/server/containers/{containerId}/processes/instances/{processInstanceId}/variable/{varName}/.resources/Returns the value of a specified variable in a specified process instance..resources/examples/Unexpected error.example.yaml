$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/instances/:processIn\
    stanceId/variable/:varName"
  method: GET
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instance belongs to
    - key: processInstanceId
      value: "123"
      description: identifier of the process instance that variable should be retrieved from
    - key: varName
      value: person
      description: variable name to be retrieved
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 4000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/instances/:processIn\
    stanceId/variable/:varName"
  method: PUT
  headers:
    Content-Type: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instance belongs to
    - key: processInstanceId
      value: "123"
      description: identifier of the process instance to be updated
    - key: varName
      value: name
      description: name of the variable to be set/updated
  body:
    type: json
    content: string
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 2000

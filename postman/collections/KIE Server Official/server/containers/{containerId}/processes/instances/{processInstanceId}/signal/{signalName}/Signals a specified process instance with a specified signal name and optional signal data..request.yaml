$kind: http-request
url: "{{baseUrl}}:/server/containers/:containerId/processes/instances/:processI\
  nstanceId/signal/:signalName"
method: POST
headers:
  Content-Type: application/json
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that process instance belongs to
  - key: processInstanceId
    value: "123"
    description: identifier of the process instance to be signaled
  - key: signalName
    value: EventReceived
    description: signal name to be send to process instance
body:
  type: json
  content: ""
examples: ./.resources/Signals a specified process instance with a specified
  signal name and optional signal data..resources/examples
order: 1000

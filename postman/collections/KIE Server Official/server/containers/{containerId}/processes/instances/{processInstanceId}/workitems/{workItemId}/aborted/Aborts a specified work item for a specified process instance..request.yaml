$kind: http-request
url: "{{baseUrl}}:/server/containers/:containerId/processes/instances/:processI\
  nstanceId/workitems/:workItemId/aborted"
method: PUT
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that process instance belongs to
  - key: processInstanceId
    value: "123"
    description: identifier of the process instance that work item belongs to
  - key: workItemId
    value: "567"
    description: identifier of the work item to abort
examples: ./.resources/Aborts a specified work item for a specified process
  instance..resources/examples
order: 1000

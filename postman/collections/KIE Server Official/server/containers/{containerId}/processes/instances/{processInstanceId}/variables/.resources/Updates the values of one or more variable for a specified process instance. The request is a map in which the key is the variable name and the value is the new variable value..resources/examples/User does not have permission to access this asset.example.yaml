$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/instances/:processIn\
    stanceId/variables"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instance belongs to
    - key: processInstanceId
      value: "123"
      description: identifier of the process instance to be updated
  body:
    type: json
    content: string
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: text
    content: ""
order: 1000

$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/processes/instances/:processIn\
  stanceId/variables"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that process instance belongs to
  - key: processInstanceId
    value: "123"
    description: identifier of the process instance that variables should be retrieved from
examples: ./.resources/Retrieves all variables for a specified process instance
  as a map in which the key is the variable name and the value is the variable
  value..resources/examples
order: 2000

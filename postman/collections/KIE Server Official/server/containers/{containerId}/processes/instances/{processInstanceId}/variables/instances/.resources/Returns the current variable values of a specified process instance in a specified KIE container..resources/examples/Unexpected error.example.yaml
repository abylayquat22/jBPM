$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/instances/:processIn\
    stanceId/variables/instances"
  method: GET
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instance belongs to
    - key: processInstanceId
      value: "123"
      description: identifier of the process instance that variables state should be
        collected for

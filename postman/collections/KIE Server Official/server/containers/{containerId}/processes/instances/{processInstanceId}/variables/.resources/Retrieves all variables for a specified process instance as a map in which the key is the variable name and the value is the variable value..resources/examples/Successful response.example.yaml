$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/instances/:processIn\
    stanceId/variables"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instance belongs to
    - key: processInstanceId
      value: "123"
      description: identifier of the process instance that variables should be
        retrieved from
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "application": {
          "com.myspace.mortgage_app.Application": {
            "applicant": {
              "com.myspace.mortgage_app.Applicant": {
                "name": "",
                "annualincome": 0,
                "address": null,
                "ssn": 0,
                "creditrating": null
              }
            },
            "property": {
              "com.myspace.mortgage_app.Property": {
                "age": 0,
                "address": "",
                "locale": "",
                "saleprice": 0
              }
            },
            "downpayment": 0,
            "amortization": 0,
            "mortgageamount": null
          }
        },
        "initiator": "baAdmin"
      }
order: 1000

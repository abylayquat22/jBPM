$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/instances/correlatio\
    n/:correlationKey/signal/:signalName"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instance belongs to
    - key: correlationKey
      value: "123"
      description: correlation key of the process instance to be signaled
    - key: signalName
      value: EventReceived
      description: signal name to be sent to process instance
  body:
    type: json
    content: string
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 3000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/processes/instances/:processIn\
    stanceId/workitems/:workItemId/completed"
  method: PUT
  headers:
    Content-Type: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process instance belongs to
    - key: processInstanceId
      value: "123"
      description: identifier of the process instance that work item belongs to
    - key: workItemId
      value: "567"
      description: identifier of the work item to complete
  body:
    type: json
    content: string
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 2000

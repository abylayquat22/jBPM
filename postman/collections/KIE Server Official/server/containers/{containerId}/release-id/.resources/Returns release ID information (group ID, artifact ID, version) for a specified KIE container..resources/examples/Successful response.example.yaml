$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/release-id"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: Container id that release id should be loaded from
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "response": [
          {
            "type": "SUCCESS",
            "msg": "ReleaseId for container MyProjectContainer",
            "result": {
              "release-id": {
                "group-id": "com.redhat",
                "artifact-id": "Project1",
                "version": "1.0"
              }
            }
          }
        ]
      }
order: 1000

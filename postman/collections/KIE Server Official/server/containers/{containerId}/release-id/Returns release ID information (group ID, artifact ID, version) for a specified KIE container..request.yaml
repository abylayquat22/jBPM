$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/release-id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: containerId
    value: "{{containerId}}"
    description: Container id that release id should be loaded from
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
examples: ./.resources/Returns release ID information (group ID, artifact ID,
  version) for a specified KIE container..resources/examples
order: 1000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/forms/processes/:processId/con\
    tent?renderer=patternfly"
  method: GET
  headers:
    Accept: text/html
  queryParams:
    - key: renderer
      value: patternfly
      description: optional renderer name that the form should be rendered with
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process definition belongs to
    - key: processId
      value: evaluation
      description: identifier of process definition that form should be fetched for
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: text/html
  body:
    type: text
    content: string
order: 1000

$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/forms/cases/:caseDefId/content\
  ?renderer=patternfly"
method: GET
headers:
  Accept: text/html
queryParams:
  - key: renderer
    value: patternfly
    description: optional renderer name that the form should be rendered with
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that case definition belongs to
  - key: caseDefId
    value: orderhardware
    description: identifier of case definition that form should be fetched for
examples: ./.resources/Returns the rendered form for a specified case
  definition..resources/examples
order: 1000

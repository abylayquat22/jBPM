$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/tasks/:taskInstanceId/states/s\
  uspended?user=string"
method: PUT
headers:
  Content-Type: application/json
queryParams:
  - key: user
    value: string
    description: optional user id to be used instead of authenticated user - only
      when bypass authenticated user is enabled
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that task instance belongs to
  - key: taskInstanceId
    value: "123"
    description: identifier of the task instance that should be suspended
body:
  type: json
  content: string
examples: ./.resources/Suspends a specified task instance..resources/examples
order: 1000

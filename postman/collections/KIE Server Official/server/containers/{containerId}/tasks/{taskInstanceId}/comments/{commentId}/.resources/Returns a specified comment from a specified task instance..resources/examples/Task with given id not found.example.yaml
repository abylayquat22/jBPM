$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/tasks/:taskInstanceId/comments\
    /:commentId"
  method: GET
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that task instance belongs to
    - key: taskInstanceId
      value: "123"
      description: identifier of the task instance that comment belongs to
    - key: commentId
      value: "567"
      description: identifier of the comment to be loaded
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 2000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/tasks/:taskInstanceId/states/f\
    orwarded?user=string&targetUser=string"
  method: PUT
  queryParams:
    - key: user
      value: string
      description: optional user id to be used instead of authenticated user - only
        when bypass authenticated user is enabled
    - key: targetUser
      value: string
      description: user that the task should be forwarded to
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that task instance belongs to
    - key: taskInstanceId
      value: "123"
      description: identifier of the task instance that should be forwarded
response:
  statusCode: 403
  statusText: Forbidden
  body:
    type: text
    content: ""
order: 1000

$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/tasks/:taskInstanceId?withInpu\
  tData=true&withOutputData=true&withAssignments=true"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: withInputData
    value: "true"
    description: optionally loads task input data
  - key: withOutputData
    value: "true"
    description: optionally loads task output data
  - key: withAssignments
    value: "true"
    description: optionally loads task people assignments
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that task instance belongs to
  - key: taskInstanceId
    value: "123"
    description: identifier of the task instance that should be loaded
examples: ./.resources/Returns information about a specified task
  instance..resources/examples
order: 11000

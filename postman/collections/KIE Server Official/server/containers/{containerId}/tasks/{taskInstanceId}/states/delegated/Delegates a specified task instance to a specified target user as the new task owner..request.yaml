$kind: http-request
url: "{{baseUrl}}/server/containers/:containerId/tasks/:taskInstanceId/states/d\
  elegated?user=string&targetUser=string"
method: PUT
queryParams:
  - key: user
    value: string
    description: optional user id to be used instead of authenticated user - only
      when bypass authenticated user is enabled
  - key: targetUser
    value: string
    description: user that task should be dalegated to
pathVariables:
  - key: containerId
    value: evaluation_1.0.0-SNAPSHOT
    description: container id that task instance belongs to
  - key: taskInstanceId
    value: "123"
    description: identifier of the task instance that should be delegated
examples: ./.resources/Delegates a specified task instance to a specified target
  user as the new task owner..resources/examples
order: 1000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/images/processes/:processId"
  method: GET
  headers:
    Accept: application/svg+xml
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process definition belongs to
    - key: processId
      value: evaluation
      description: identifier of the process definition that image should be loaded for
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/svg+xml
  body:
    type: xml
    content: |-
      <?xml version="1.0" encoding="UTF-8"?>
      <element>(string)</element>
order: 1000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/images/processes/:processId"
  method: GET
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: container id that process definition belongs to
    - key: processId
      value: evaluation
      description: identifier of the process definition that image should be loaded for
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 2000

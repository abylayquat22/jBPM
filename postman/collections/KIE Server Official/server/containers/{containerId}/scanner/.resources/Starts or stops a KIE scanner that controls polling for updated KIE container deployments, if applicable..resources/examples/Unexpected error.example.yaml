$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId/scanner"
  method: POST
  headers:
    Content-Type: application/json
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: Container id for scanner to be updated
  body:
    type: json
    content: string
response:
  statusCode: 500
  statusText: Internal Server Error
  body:
    type: text
    content: ""
order: 2000

$kind: http-example
request:
  url: "{{baseUrl}}/server/containers/:containerId?abortProcessInstances=true"
  method: DELETE
  headers:
    Accept: application/json
  queryParams:
    - key: abortProcessInstances
      value: "true"
      description: optional abortProcessInstances flag to abort process instances when
        container is disposed
  pathVariables:
    - key: containerId
      value: evaluation_1.0.0-SNAPSHOT
      description: Container id to be disposed (undeployed)
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "response": [
          {
            "type": "SUCCESS",
            "msg": "Container MyProjectContainer successfully disposed.",
            "result": null
          }
        ]
      }
order: 1000

$kind: http-request
url: "{{base_url}}/kie-server/services/rest/server/containers/{{containerId}}"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: "{\r

    \  \"container-id\": \"{{containerId}}\",\r

    \  \"release-id\": {\r

    \    \"group-id\": \"{{groupId}}\",\r

    \    \"artifact-id\": \"{{artifactId}}\",\r

    \    \"version\": \"{{version}}\"\r

    \  }\r

    }\r\n"
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
order: 2000

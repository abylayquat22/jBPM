$kind: http-request
url: "{{base_url}}/kie-server/services/rest/server/containers?artifactId={{arti\
  factId}}"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: groupId
    value: "{{groupId}}"
    disabled: true
    description: optional groupId to filter containers by
  - key: version
    value: "{{version}}"
    disabled: true
    description: optional version to filter containers by
  - key: status
    value: STARTED
    disabled: true
    description: optional status to filter containers by
  - key: artifactId
    value: "{{artifactId}}"
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Server response status\", function () {\r

      \    if (pm.response.status !== \"OK\") {\r

      \        let msg;\r

      \        try {\r

      \            msg = pm.response.json().msg;\r

      \        } catch (err) {\r

      \            msg = pm.response.text();\r

      \        } finally {\r

      \            throw new Error(JSON.stringify([msg]));\r

      \        }\r

      \    }\r

      \r

      \    if (pm.response.json().type !== \"SUCCESS\") {\r

      \        throw new Error(JSON.stringify([pm.response.json().msg]));\r

      \    }\r

      });\r\n"
    language: text/javascript
order: 1000

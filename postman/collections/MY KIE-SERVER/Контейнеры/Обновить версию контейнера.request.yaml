$kind: http-request
url: "{{base_url}}/kie-server/services/rest/server/containers/{{containerId}}/r\
  elease-id?resetBeforeUpdate=false"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: resetBeforeUpdate
    value: "false"
    description: Determines whether active processes are aborted (reset) before
      updating when the server runs in development mode
body:
  type: json
  content: "{\r

    \    \"group-id\": \"{{groupId}}\",\r

    \    \"artifact-id\": \"{{artifactId}}\",\r

    \    \"version\": \"{{version}}\"\r

    }"
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
order: 5000

$kind: http-request
url: "{{base_url}}/kie-server/services/rest/server/queries/processes/instances/\
  {{processInstanceId}}/nodes/instances"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: activeOnly
    value: "true"
    disabled: true
  - key: completedOnly
    value: "true"
    disabled: true
  - key: page
    value: "0"
    disabled: true
  - key: pageSize
    value: "10"
    disabled: true
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Server response status\", function () {\r

      \    if (pm.response.status !== \"OK\") {\r

      \        let msg = pm.response.text();\r

      \        throw new Error(JSON.stringify([msg]));\r

      \    }\r

      });\r

      \r

      const body = pm.response.json();\r

      \r

      pm.test(\"Ответ содержит массив node-instance\", function () {\r

      \  pm.expect(body).to.have.property(\"node-instance\");\r

      \  pm.expect(Array.isArray(body[\"node-instance\"])).to.be.true;\r

      });\r\n"
    language: text/javascript
order: 5000

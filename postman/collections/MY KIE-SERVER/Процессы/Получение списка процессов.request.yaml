$kind: http-request
url: "{{base_url}}/kie-server/services/rest/server/containers/{{containerId}}/p\
  rocesses"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "0"
    disabled: true
    description: optional pagination - at which page to start, defaults to 0 (meaning first)
  - key: pageSize
    value: "10"
    disabled: true
    description: optional pagination - size of the result, defaults to 10
  - key: sort
    value: string
    disabled: true
    description: optional sort column, no default
  - key: sortOrder
    value: "true"
    disabled: true
    description: optional sort direction (asc, desc) - defaults to asc
auth:
  type: basic
  credentials:
    password: "{{password}}"
    username: "{{username}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Server response status\", function () {\r

      \    if (pm.response.status !== \"OK\") {\r

      \        throw new Error(JSON.stringify([pm.response.text()]));\r

      \    }\r

      });\r

      \    "
    language: text/javascript
order: 3000
